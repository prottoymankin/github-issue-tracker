<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github Issue Tracker | Sign In</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- Tailwind CSS & Daisy UI CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="./styles/style.css">
</head>
<body class="bg-[#F8FAFC]">

  <main class="flex items-center justify-center h-screen">
    <div class="p-8 rounded-lg shadow-xl w-full max-w-[520px] space-y-6 bg-white">
      <div class="text-center">
        <img src="./assets/github-logo.png" alt="" class="mx-auto mb-6">
        <h2 class="text-[#1F2937] text-2xl font-semibold">GitHub Issues Tracker</h2>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
      </div>

      <div>
        <div class="flex flex-col mb-4 space-y-2">
          <label class="text-[#1F2937] font-medium">Username</label>
          <input id="name-input" type="text" placeholder="Enter Username" class="input w-full" />
        </div>
        <div class="flex flex-col space-y-2">
          <label class="text-[#1F2937] font-medium">Password</label>
          <input id="password-input" type="password" placeholder="Enter Password" class="input w-full" />
        </div>
        <button id="sign-in-btn" class="btn btn-primary w-full mt-6">Sign In</button>
      </div>
    </div>
  </main>

  <script src="./scripts/index.js"></script>
</body>
</html>
