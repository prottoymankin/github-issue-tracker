<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github Issue Tracker | Main Page</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- Tailwind CSS & Daisy UI CDN -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="./styles/style.css">
</head>
<body class="bg-[#F8FAFC]">
  
  <!-- Navbar Section -->
  <header class="bg-white border-b border-b-[#E9E9E9]">
    <nav class="flex justify-between items-center max-w-[1440px] mx-auto py-4">
      <div class="flex items-center gap-1">
        <img src="./assets/github-logo.png" alt="" class="w-9">
        <span class="text-[#1F2937] text-2xl font-semibold">GitHub Issues Tracker</span>
      </div>

      <div class="flex gap-4">
        <label class="input">
          <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2.5"
              fill="none"
              stroke="currentColor"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input type="search" required placeholder="Search issues.." />
        </label>
        <button class="btn btn-primary">Search</button>
      </div>
    </nav>
  </header>

  <section class="max-w-[1110px] mx-auto mt-[60px] p-6 bg-white rounded-lg shadow-lg gap-2 mb-4">
    <button id="all-btn" class="primary-btn active-tab tab-btn">All</button>
    <button id="open-btn" class="primary-btn tab-btn">Open</button>
    <button id="closed-btn" class="primary-btn tab-btn">Closed</button>
  </section>

  <section class="max-w-[1110px] mx-auto mt-[60px] rounded-lg shadow-lg">
    <div class="flex items-center justify-between p-6 border-b border-b-[#E4E4E7]">
      <div class="flex items-center gap-2">
        <div class="w-[50px] h-[50px] rounded-full bg-[#ECE4FF] flex items-center justify-center">
          <img src="./assets/Aperture.png" alt="">
        </div>
        <div>
          <p class="text-xl font-semibold text-[#1F2937]"><span>50</span> Issues</p>
          <p class="text-[#64748B]">Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
          <div class="h-3 w-3 rounded-full bg-[#00A96E]"></div>
          <span>Open</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="h-3 w-3 rounded-full bg-[#A855F7]"></div>
          <span>Closed</span>
        </div>
      </div>
    </div>

    <div id="issues-container" class="p-6 grid grid-cols-3 gap-3"></div>

    <!-- Modal -->
    <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
    <dialog id="issue_details" class="modal">
      <div class="modal-box">
        <div id="issue-details-info"></div>
        <div class="modal-action">
          <form method="dialog">
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <!-- Loding Spinner -->
    <div id="loading-spinner" class="hidden justify-center items-center h-[30vh]">
      <span class="loading loading-dots loading-xl"></span>
    </div>
  </section>

  <script src="./scripts/homepage.js"></script>
</body>
</html>
